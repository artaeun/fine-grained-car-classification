<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 210" width="1280" height="210" role="img" aria-label="Fine-Grained Car Make Classification. 87.55% top-1 on CompCars, 4.65 points over the OverFeat baseline">
  <defs>
    <linearGradient id="gold" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#f5dc8a"/>
      <stop offset="55%" stop-color="#c9a227"/>
      <stop offset="100%" stop-color="#a97f1c"/>
    </linearGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#131318"/>
      <stop offset="100%" stop-color="#0b0b0d"/>
    </linearGradient>
    <pattern id="hazard" width="18" height="18" patternUnits="userSpaceOnUse" patternTransform="rotate(135)">
