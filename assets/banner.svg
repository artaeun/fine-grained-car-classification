  <rect width="1280" height="210" rx="6" fill="url(#bg)"/>
  <rect x="0" y="205" width="1280" height="5" fill="url(#hazard)" opacity="0.5"/>

  <text x="52" y="72" font-family="ui-monospace, 'Cascadia Mono', Consolas, 'DejaVu Sans Mono', monospace"
